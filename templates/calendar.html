<!doctype html>
<html>
    <head>
        <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.20/index.global.min.js"></script>
    </head>
    <body>
        <div id="calendar"></div>
        <script>
            document.addEventListener("DOMContentLoaded", function () {
                var calendarEl = document.getElementById("calendar");
                var calendar = new FullCalendar.Calendar(calendarEl, {
                    initialView: "timeGridWeek",
                    headerToolbar: {
                        left: "prev,next today",
                        center: "title",
                        right: "timeGridDay,timeGridWeek,dayGridMonth",
                    },
                    events: async function (
                        info,
                        successCallback,
                        failureCallback,
                    ) {
                        const user_id = localStorage.getItem("user_id");
                        const response = await fetch("/get_events", {
                            method: "POST",
                            headers: { "Content-Type": "application/json" },
                            body: JSON.stringify({ user_id: user_id }),
                        });
                        const data = await response.json();
                        const events = data.events.map((e) => ({
                            title: e.header,
                            start: e.date,
                            id: e.id,
                        }));
                        successCallback(events);
                    },
                    // dateClick: function (info) {
                    //     const header = prompt("Event title:");
                    //     if (!header) return;
                    //     const date = info.dateStr + " 00:00:00";
                    //     const user_id = localStorage.getItem("user_id");

                    //     fetch("/create_event", {
                    //         method: "POST",
                    //         headers: { "Content-Type": "application/json" },
                    //         body: JSON.stringify({
                    //             header: header,
                    //             description: "",
                    //             date: date,
                    //             duration: 60,
                    //             user_id: user_id,
                    //         }),
                    //     }).then(() => calendar.refetchEvents());
                    // },
                    selectable: true,
                    select: function(info) {
                        const header = prompt('Event title:');
                        if (!header) return;

                        const start = info.startStr.replace('T', ' ').split('+')[0].split('-0')[0];
                        const duration = Math.round((new Date(info.end) - new Date(info.start)) / 60000);
                        const date = info.startStr.includes('T')
                            ? info.startStr.replace('T', ' ').split('+')[0]
                            : info.startStr + ' 00:00:00';
                        const user_id = localStorage.getItem('user_id');

                        fetch('/create_event', {
                            method: 'POST',
                            headers: {'Content-Type': 'application/json'},
                            body: JSON.stringify({
                                header: header,
                                description: '',
                                date: date,
                                duration: duration,
                                user_id: user_id
                            })
                        }).then(() => calendar.refetchEvents());
                    }
        </script>
    </body>
</html>
