<!doctype html>
<html>
    <head>
        <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.20/index.global.min.js"></script>
        <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
            rel="stylesheet"
        />
    </head>
    <body>
        <div class="container mt-3">
            <div id="calendar"></div>
        </div>
        <script>
            document.addEventListener("DOMContentLoaded", function () {
                const userId = localStorage.getItem("user_id");

                if (!userId) {
                    alert("Please log in first!");
                    window.location.href = "/";
                    return;
                }

                var calendarEl = document.getElementById("calendar");
                var calendar = new FullCalendar.Calendar(calendarEl, {
                    initialView: "timeGridWeek",
                    headerToolbar: {
                        left: "prev,next today",
                        center: "title",
                        right: "timeGridDay,timeGridWeek,dayGridMonth",
                    },
                    selectable: true,
                    editable: true,
                    eventDurationEditable: true,

                    events: async function (
                        fetchInfo,
                        successCallback,
                        failureCallback,
                    ) {
                        try {
                            const response = await fetch("/get_events", {
                                method: "POST",
                                headers: { "Content-Type": "application/json" },
                                body: JSON.stringify({ user_id: userId }),
                            });
                            const data = await response.json();

                            const formattedEvents = data.events.map((e) => ({
                                id: e.id,
                                title: e.header,
                                start: e.date.replace(" ", "T"),
                                duration: e.duration + "m",
                            }));

                            successCallback(formattedEvents);
                        } catch (error) {
                            console.error("Error fetching events:", error);
                            failureCallback(error);
                        }
                    },

                    select: async function (info) {
                        const title = prompt("Enter Event Title:");
                        if (title) {
                            const response = await fetch("/create_event", {
                                method: "POST",
                                headers: { "Content-Type": "application/json" },
                                body: JSON.stringify({
                                    header: title,
                                    description: "New Event",
                                    date: info.start.toISOString(),
                                    duration: Math.round(
                                        (info.end - info.start) / 60000,
                                    ),
                                    user_id: userId,
                                }),
                            });

                            if (response.ok) {
                                calendar.refetchEvents();
                            } else {
                                alert("Failed to create event.");
                            }
                        }
                    },

                    eventDrop: async function (info) {
                        const response = await fetch("/update_event", {
                            method: "POST",
                            headers: { "Content-Type": "application/json" },
                            body: JSON.stringify({
                                id: info.event.id,
                                date: info.event.start.toISOString(),
                                user_id: userId,
                            }),
                        });
                        if (!response.ok) {
                            alert("Failed to update event");
                            info.revert();
                        }
                    },

                    eventResize: async function (info) {
                        const response = await fetch("/update_event", {
                            method: "POST",
                            headers: { "Content-Type": "application/json" },
                            body: JSON.stringify({
                                id: info.event.id,
                                date: info.event.start.toISOString(),
                                duration: Math.round(
                                    (info.event.end - info.event.start) / 60000,
                                ),
                                user_id: userId,
                            }),
                        });
                        if (!response.ok) {
                            alert("Failed to update event");
                            info.revert();
                        }
                    },
                });
                calendar.render();
            });
        </script>
    </body>
</html>
